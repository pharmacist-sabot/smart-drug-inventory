name: 'Release Windows Installer'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build Tauri and Create Windows Installer
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Smart Drug Inventory ${{ github.ref_name }}'
          releaseBody: 'ดาวน์โหลดไฟล์ตัวติดตั้ง .msi หรือ .exe สำหรับ Windows ได้ที่ Assets ด้านล่าง'
          releaseDraft: false
          prerelease: false
